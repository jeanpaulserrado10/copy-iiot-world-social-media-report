<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIoT World | Report Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f2f2;
            color: #3f3f3f;
        }
        .bg-iiot-orange { background-color: #e64d25; }
        .text-iiot-orange { color: #e64d25; }
        .bg-iiot-blue { background-color: #283b82; }
        .text-iiot-blue { color: #283b82; }
        .border-iiot-orange { border-color: #e64d25; }

        @media print {
            @page {
                margin: 0;
                size: landscape;
            }
            body {
                background-color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                overflow: visible !important;
                width: 100% !important;
            }
            
            /* Hide all direct children of body except root */
            body > *:not(#root) {
                display: none !important;
            }

            #root {
                display: block !important;
                width: 100% !important;
            }

            /* Hide UI elements */
            header, footer, .print\:hidden {
                display: none !important;
            }

            /* Reset main container */
            main {
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                width: 100% !important;
                display: block !important;
            }

            /* Print Container */
            .print\:block {
                display: block !important;
                width: 100% !important;
            }

            .print-content-container {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* Slide Page Breaks */
            .print-page-break {
                display: flex !important;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 100% !important;
                height: 100vh !important;
                page-break-after: always !important;
                break-after: page !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                overflow: hidden !important;
                position: relative !important;
            }
            
            .print-page-break:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            /* Reset styles */
            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }
            
            a {
                text-decoration: none !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>

}
