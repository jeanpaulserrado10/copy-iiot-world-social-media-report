<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIoT World | Report Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f2f2f2;
            color: #3f3f3f;
        }
        .bg-iiot-orange { background-color: #e64d25; }
        .text-iiot-orange { color: #e64d25; }
        .bg-iiot-blue { background-color: #283b82; }
        .text-iiot-blue { color: #283b82; }
        .border-iiot-orange { border-color: #e64d25; }

        @media print {
            @page {
                margin: 0;
                size: auto;
            }
            body {
                background-color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                overflow: visible !important;
            }
            #root > div > header,
            #root > div > footer,
            .print\:hidden {
                display: none !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                width: 100% !important;
                display: block !important;
            }
            .print-page-break {
                display: block !important;
                width: 100% !important;
                /* Avoid break inside slide content */
                break-inside: avoid;
                page-break-inside: avoid;
            }
            /* Only break after if it's not the last slide to prevent blank pages */
            .print-page-break:not(:last-child) {
                page-break-after: always !important;
                break-after: page !important;
            }
            /* Ensure buttons don't have weird dark shadows in print */
            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }
            /* Removed color: inherit !important to keep button text white */
            a {
                text-decoration: none !important;
            }
            .print-content-container {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
<script type="importmap">
{
  "imports": {
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
